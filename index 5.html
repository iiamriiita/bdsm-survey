<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;

  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.20);--border3:rgba(0,0,0,.38);
  --green:#1e6e34;--green-bg:#edfbf1;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#272727;--bg3:#313131;
  --text:#e4e4e4;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.20);--border3:rgba(255,255,255,.38);

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;line-height:1.6}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px 110px}
.lang-row{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.lang-btn{padding:5px 14px;border:.5px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--bg2);color:var(--text);border-color:var(--border3)}
h1{font-size:22px;font-weight:500;margin-bottom:6px}
.sub{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}

/* step progress */
.step-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.step-label{font-size:13px;color:var(--text2)}
.step-filled{font-size:13px;color:var(--text3)}
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden}
.prog-bar{height:100%;background:var(--text);border-radius:2px;transition:width .3s}
.step-dots{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.step-dot.active{background:var(--text);transform:scale(1.3)}
.step-dot.done{background:var(--text2)}

.sec-head{font-size:16px;font-weight:500;padding:10px 0;border-bottom:.5px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-icon{font-size:16px;color:var(--text2)}
.q-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.q-card:hover{border-color:var(--border2)}
.q-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.q-num{font-size:11px;color:var(--text3);min-width:18px;padding-top:3px;flex-shrink:0}
.q-text{font-size:14px;color:var(--text);line-height:1.5;flex:1}
.q-info{width:18px;height:18px;border-radius:50%;border:.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;padding:0;transition:all .15s}
.q-info:hover{background:var(--bg2)}
.q-info i{font-size:11px;color:var(--text2)}
.q-tip{display:none;margin:0 0 10px 26px;font-size:13px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:8px 12px;line-height:1.5;border-left:2px solid var(--border2)}
.q-tip.open{display:block}
.rating-row{display:flex;align-items:center;gap:10px;margin-left:26px}
.rl{font-size:11px;color:var(--text3);min-width:20px}
.rl.right{text-align:right}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text);border:2px solid var(--bg);cursor:pointer}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--text);border:2px solid var(--bg);cursor:pointer;border:none}
.r-val{font-size:13px;font-weight:500;min-width:20px;text-align:center}
.note-toggle{font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:3px;margin:8px 0 0 26px;border:none;background:none;padding:0;font-family:inherit}
.note-toggle:hover{color:var(--text2)}
.note-area{margin:6px 0 0 26px;display:none}
.note-area.open{display:block}
.note-row{display:flex;gap:6px;align-items:flex-start}
textarea{flex:1;border:.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg2);resize:vertical;min-height:56px;line-height:1.5}
textarea:focus{outline:none;border-color:var(--border3)}
.mic-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;transition:all .15s}
.mic-btn:hover{background:var(--bg3)}
.mic-btn.recording{background:#fef2f2;border-color:#fca5a5;color:#b91c1c;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.mic-st{font-size:11px;color:var(--text3);margin-top:4px;min-height:14px}
.mic-st.on{color:#b91c1c}

.comm-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.comm-label{font-size:14px;color:var(--text);margin-bottom:10px}
.comm-opts{display:flex;flex-wrap:wrap;gap:6px}
.comm-opt{padding:5px 14px;border:.5px solid var(--border2);border-radius:20px;font-size:13px;cursor:pointer;color:var(--text2);background:transparent;font-family:inherit;transition:all .15s}
.comm-opt.sel{background:var(--bg2);border-color:var(--border3);color:var(--text)}
.open-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.open-label{font-size:14px;color:var(--text);margin-bottom:8px}
.open-row{display:flex;gap:6px;align-items:flex-start}
.open-ta{width:100%;min-height:72px}

/* fixed nav */
.fixed-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--border);padding:12px 16px;z-index:100}
.fixed-inner{max-width:700px;margin:0 auto;display:flex;gap:10px;justify-content:space-between;align-items:center}
.btn{padding:9px 20px;border-radius:var(--r);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text2);border:.5px solid var(--border2)}
.btn-ghost:hover{border-color:var(--border3);color:var(--text)}
.btn-primary{background:var(--text);color:var(--bg);border:none;font-weight:500}
.btn-primary:hover{opacity:.83}
.btn-sm{padding:7px 14px;font-size:13px}
.nav-center{font-size:12px;color:var(--text3);text-align:center;flex:1}

/* results */
.res-header{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.res-title{font-size:22px;font-weight:500;margin-bottom:4px}
.res-meta{font-size:13px;color:var(--text2)}
.res-actions{display:flex;gap:8px;flex-wrap:wrap}
.sort-btn,.share-btn{padding:7px 12px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.sort-btn:hover,.share-btn:hover{border-color:var(--border3);color:var(--text)}
.tr-bar{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tr-status{font-size:13px;color:var(--text2);flex:1}
.res-sec{margin-bottom:24px}
.res-sec-title{font-size:15px;font-weight:500;padding-bottom:8px;border-bottom:.5px solid var(--border);margin-bottom:12px}
.res-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:.5px solid var(--border)}
.res-item:last-child{border-bottom:none}
.res-qtext{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.res-note{font-size:12px;color:var(--text2);margin-top:3px;font-style:italic}
.res-note-tr{font-size:12px;color:var(--text3);margin-top:2px;font-style:italic}
.score-wrap{display:flex;align-items:center;gap:8px;min-width:68px;padding-top:2px}
.score-bar-bg{width:44px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.score-bar{height:100%;border-radius:2px;background:var(--text)}
.score-num{font-size:13px;font-weight:500;min-width:16px;text-align:right}
.score-high{color:var(--green)}
.open-ans{font-size:13px;background:var(--bg2);border-radius:var(--r);padding:8px 10px;margin-top:4px;line-height:1.5}
.open-ans-tr{font-size:12px;color:var(--text2);background:var(--bg3);border-radius:var(--r);padding:6px 10px;margin-top:4px;line-height:1.5;font-style:italic}
.export-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.shared-banner{background:var(--green-bg);border:.5px solid var(--green);border-radius:var(--r);padding:10px 14px;margin-bottom:20px;font-size:13px;color:var(--green);display:flex;align-items:center;gap:8px}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

</div>

</div>

function renderStep(){

  // dots
  const dots=document.getElementById('stepDots');
  dots.innerHTML='';
  for(let i=0;i<TOTAL_STEPS;i++){
    const d=document.createElement('span');
    d.className='step-dot'+(i===curStep?' active':hasStepData(i)?' done':'');
    d.onclick=()=>{curStep=i;renderStep();window.scrollTo(0,0)};

  const cont=document.getElementById('stepContent');

<div class="rating-row"><span class="rl">0</span><input type="range" min="0" max="10" step="1" value="${ratings[id]}" oninput="R('${id}',this)"><span class="rl right">10</span><span class="r-val" id="v_${id}">${ratings[id]}</span></div>
<button class="note-toggle" onclick="TN('${id}',this)">${hasN?T('hideN'):T('addN')}</button>
<div class="note-area${hasN?' open':''}" id="n_${id}"><div class="note-row"><textarea placeholder="${T('nPh')}" oninput="notes['${id}']=this.value;trToEn['${id}']='';trToZh['${id}']='';">${notes[id]||''}</textarea><button class="mic-btn" onclick="mic('${id}','note')"><i class="ti ti-microphone" style="font-size:15px" aria-hidden="true"></i></button></div><div class="mic-st" id="ms_${id}"></div></div>`;
    cont.appendChild(c);
  });
}

function renderCommStep(cont,sec){
  cont.innerHTML=`<div class="sec-head"><i class="ti ${sec.icon} sec-icon" aria-hidden="true"></i>${TQ(sec)}</div>`;
  sec.q.forEach((q,qi)=>{
    const id='comm_'+qi;
    const hasN=!!(notes[id]&&notes[id].trim());
    const c=document.createElement('div');c.className='comm-card';
    const opts=q.oe.map((o,oi)=>`<button class="comm-opt${commA[qi]===oi?' sel':''}" onclick="selC(${qi},${oi},this)">${lang==='zh'?q.oz[oi]:q.oe[oi]}</button>`).join('');
    c.innerHTML=`<div class="comm-label">${TQ(q)}</div><div class="comm-opts">${opts}</div>
<button class="note-toggle" style="margin-left:0" onclick="TN('${id}',this)">${hasN?T('hideN'):T('addN')}</button>
<div class="note-area${hasN?' open':''}" style="margin-left:0" id="n_${id}"><div class="note-row"><textarea placeholder="${T('nPh')}" oninput="notes['${id}']=this.value;trToEn['${id}']='';trToZh['${id}']='';">${notes[id]||''}</textarea><button class="mic-btn" onclick="mic('${id}','note')"><i class="ti ti-microphone" style="font-size:15px" aria-hidden="true"></i></button></div><div class="mic-st" id="ms_${id}"></div></div>`;
    cont.appendChild(c);
  });
}

function renderOpenStep(cont,sec){
  cont.innerHTML=`<div class="sec-head"><i class="ti ${sec.icon} sec-icon" aria-hidden="true"></i>${TQ(sec)}</div>`;
  sec.q.forEach((q,qi)=>{
    const c=document.createElement('div');c.className='open-card';
    c.innerHTML=`<div class="open-label">${qi+1}. ${TQ(q)}</div><div class="open-row"><textarea class="open-ta" placeholder="${T('oPh')}" oninput="openA[${qi}]=this.value;trToEn['o${qi}']='';trToZh['o${qi}']='';">${openA[qi]||''}</textarea><button class="mic-btn" onclick="mic('open_${qi}','open')"><i class="ti ti-microphone" style="font-size:15px" aria-hidden="true"></i></button></div><div class="mic-st" id="ms_open_${qi}"></div>`;
    cont.appendChild(c);
  });
}

function R(id,el){ratings[id]=+el.value;document.getElementById('v_'+id).textContent=ratings[id];const r=Object.values(ratings).filter(v=>v>0).length;document.getElementById('stepFilled').textContent=`${r}/${totalQ} ${T('filled')}`;document.getElementById('progBar').style.width=Math.round(r/totalQ*100)+'%';document.querySelectorAll('.step-dot')[curStep].classList.add('done');}
function TN(id,btn){const a=document.getElementById('n_'+id);const o=a.classList.toggle('open');btn.textContent=o?T('hideN'):T('addN');}
function selC(qi,oi,btn){commA[qi]=oi;btn.closest('.comm-opts').querySelectorAll('.comm-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}

// ─── VOICE ────────────────────────────────────────────────────────────
function mic(id,type){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR||!window.isSecureContext){toast(T('micE'),4000);return;}
  if(activeRec){try{activeRec.stop();}catch(e){}activeRec=null;}
  const r=new SR();r.lang=lang==='zh'?'zh-TW':'en-US';r.interimResults=false;
  const st=document.getElementById('ms_'+id);
  const mb=document.querySelector(`[onclick="mic('${id}','${type}')"]`);
  if(mb)mb.classList.add('recording');
  if(st){st.textContent=T('micS');st.className='mic-st on';}
  activeRec=r;
  r.onresult=e=>{
    const tx=e.results[0][0].transcript;
    if(type==='open'){const qi=+id.replace('open_','');const tas=document.querySelectorAll('.open-ta');if(tas[qi]){tas[qi].value+=(tas[qi].value?' ':'')+tx;openA[qi]=tas[qi].value;trToEn['o'+qi]='';trToZh['o'+qi]='';}}
    else{const ta=document.querySelector('#n_'+id+' textarea');if(ta){ta.value+=(ta.value?' ':'')+tx;notes[id]=ta.value;trToEn[id]='';trToZh[id]='';}}
  };
  r.onend=()=>{if(mb)mb.classList.remove('recording');if(st){st.textContent='';st.className='mic-st';}activeRec=null;};
  r.onerror=e=>{if(mb)mb.classList.remove('recording');if(st){st.textContent='';st.className='mic-st';}toast(e.error==='not-allowed'?T('micD'):T('micE'),3000);activeRec=null;};
  try{r.start();}catch(e){toast(T('micE'),4000);}
}

// ─── TRANSLATION (MyMemory — free, no key) ────────────────────────────
async function tr1(text,lp){
  const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${lp}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.responseStatus===200&&d.responseData?.translatedText){
    let t=d.responseData.translatedText;
    if(t===t.toUpperCase()&&text!==text.toUpperCase())t=t.charAt(0).toUpperCase()+t.slice(1).toLowerCase();
    return t;
  }
  throw new Error(d.responseDetails||'fail');
}

async function runTranslation(){
  const btn=document.getElementById('trBtn');
  const st=document.getElementById('trStatus');
  btn.disabled=true;btn.textContent=T('trL');
  const toZh=lang==='zh';
  const lp=toZh?'en|zh-TW':'zh-TW|en';
  const store=toZh?trToZh:trToEn;
  const jobs=[];
  S.forEach(sec=>{sec.q.forEach((_,qi)=>{const id=sec.id+'_'+qi;if(notes[id]&&notes[id].trim()&&!store[id])jobs.push({k:id,t:notes[id]});});});
  CS.q.forEach((_,qi)=>{const id='comm_'+qi;if(notes[id]&&notes[id].trim()&&!store[id])jobs.push({k:id,t:notes[id]});});
  OS.q.forEach((_,qi)=>{const k='o'+qi;if(openA[qi]&&openA[qi].trim()&&!store[k])jobs.push({k,t:openA[qi]});});
  if(!jobs.length){st.textContent=T('trOk');btn.disabled=false;btn.textContent=T('trBtn');buildResults();return;}
  let done=0,fail=0;
  st.textContent=`${T('trL')} (0/${jobs.length})`;
  for(const j of jobs){
    try{store[j.k]=await tr1(j.t,lp);done++;}catch(e){fail++;}
    st.textContent=`${T('trL')} (${done+fail}/${jobs.length})`;
  }
  st.textContent=fail>0?`${T('trOk')} (${fail} failed)`:T('trOk');
  btn.disabled=false;btn.textContent=T('trBtn');
  buildResults();
}

// ─── RESULTS ──────────────────────────────────────────────────────────
function showResults(){
  document.getElementById('vSurvey').style.display='none';
  document.getElementById('fixedBar').style.display='none';
  document.getElementById('vResults').style.display='block';
  updateResultsUI();buildResults();window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('vResults').style.display='none';
  document.getElementById('vSurvey').style.display='block';
  document.getElementById('fixedBar').style.display='block';
  renderStep();window.scrollTo(0,0);
}
function updateResultsUI(){
  document.getElementById('rTitle').textContent=T('resT');
  document.getElementById('rBack').textContent=T('back');
  document.getElementById('rExport').textContent=T('exp');
  document.getElementById('shareLbl').textContent=T('share');
  updateSortLabel();
  const tgt=lang==='zh'?'中文':'English';
  document.getElementById('trStatus').textContent=`${T('trN')} ${tgt}`;
  document.getElementById('trBtn').textContent=T('trBtn');
}
function toggleSort(){sortMode=sortMode==='default'?'high':sortMode==='high'?'low':'default';updateSortLabel();buildResults();}
function updateSortLabel(){document.getElementById('sortLbl').textContent=sortMode==='high'?T('sortH'):sortMode==='low'?T('sortL'):T('sortD');}

function buildResults(){
  const cont=document.getElementById('resCont');cont.innerHTML='';
  const vals=Object.values(ratings).filter(v=>v>0);
  const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0;
  document.getElementById('rMeta').textContent=lang==='zh'?`已回答 ${vals.length}/${totalQ} 題 · 平均 ${avg}/10`:`${vals.length} of ${totalQ} rated · Avg ${avg}/10`;
  const store=lang==='zh'?trToZh:trToEn;
  S.forEach(sec=>{
    let items=sec.q.map((q,qi)=>({q,id:sec.id+'_'+qi,score:ratings[sec.id+'_'+qi]||0})).filter(x=>x.score>0);
    if(!items.length)return;
    if(sortMode==='high')items=[...items].sort((a,b)=>b.score-a.score);
    else if(sortMode==='low')items=[...items].sort((a,b)=>a.score-b.score);
    const blk=document.createElement('div');blk.className='res-sec';
    blk.innerHTML=`<div class="res-sec-title">${TQ(sec)}</div>`;
    items.forEach(({q,id,score})=>{
      const it=document.createElement('div');it.className='res-item';
      const n=notes[id],tr=store[id];
      it.innerHTML=`<div style="flex:1"><div class="res-qtext">${TQ(q)}</div>${n?`<div class="res-note">${n}</div>`:''}${tr?`<div class="res-note-tr">↳ ${tr}</div>`:''}</div><div class="score-wrap"><div class="score-bar-bg"><div class="score-bar" style="width:${Math.round(score/10*100)}%"></div></div><span class="score-num ${score>=8?'score-high':''}">${score}</span></div>`;
      blk.appendChild(it);
    });
    cont.appendChild(blk);
  });
  const commHasNotes=CS.q.some((_,qi)=>notes['comm_'+qi]&&notes['comm_'+qi].trim());
  if(Object.keys(commA).length||commHasNotes){
    const blk=document.createElement('div');blk.className='res-sec';
    blk.innerHTML=`<div class="res-sec-title">${TQ(CS)}</div>`;
    CS.q.forEach((q,qi)=>{if(commA[qi]===undefined&&!(notes['comm_'+qi]&&notes['comm_'+qi].trim()))return;const ans=commA[qi]!==undefined?(lang==='zh'?q.oz[commA[qi]]:q.oe[commA[qi]]):'—';const id='comm_'+qi;const n=notes[id],tr=store[id];const it=document.createElement('div');it.className='res-item';it.innerHTML=`<div style="flex:1"><div class="res-qtext">${TQ(q)}</div>${n?`<div class="res-note">${n}</div>`:''}${tr?`<div class="res-note-tr">↳ ${tr}</div>`:''}</div><span style="font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;padding-top:2px">${ans}</span>`;blk.appendChild(it);});
    cont.appendChild(blk);
  }
  let hasO=false;const oblk=document.createElement('div');oblk.className='res-sec';
  OS.q.forEach((q,qi)=>{if(!openA[qi])return;hasO=true;const tr=store['o'+qi];const it=document.createElement('div');it.className='res-item';it.style.cssText='flex-direction:column;align-items:flex-start';it.innerHTML=`<div class="res-qtext" style="margin-bottom:5px">${TQ(q)}</div><div class="open-ans">${openA[qi]}</div>${tr?`<div class="open-ans-tr">↳ ${tr}</div>`:''}`;oblk.appendChild(it);});
  if(hasO){oblk.insertAdjacentHTML('afterbegin',`<div class="res-sec-title">${TQ(OS)}</div>`);cont.appendChild(oblk);}
}

// ─── SHARE ────────────────────────────────────────────────────────────
function shareResults(){
  const state={ratings,notes,commA,openA,lang};
  const url=`${location.origin}${location.pathname}?s=${btoa(encodeURIComponent(JSON.stringify(state)))}`;
  if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(url).then(()=>toast(T('shareOk'))).catch(()=>fbCopy(url));
  else fbCopy(url);
}
function fbCopy(url){const t=document.createElement('textarea');t.value=url;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();try{document.execCommand('copy');toast(T('shareOk'));}catch(e){toast('Copy URL manually',4000);}document.body.removeChild(t);}

function loadShared(){
  const p=new URLSearchParams(location.search);
  const d=p.get('s');if(!d)return false;
  try{const st=JSON.parse(decodeURIComponent(atob(d)));ratings=st.ratings||{};notes=st.notes||{};commA=st.commA||{};openA=st.openA||{};if(st.lang)lang=st.lang;return true;}catch(e){return false;}
}

function exportText(){
  let t=(lang==='zh'?'BDSM 遠距偏好結果':'BDSM Preferences Results')+'\n\n';
  const store=lang==='zh'?trToZh:trToEn;
  S.forEach(sec=>{let items=sec.q.map((q,qi)=>({q,id:sec.id+'_'+qi,score:ratings[sec.id+'_'+qi]||0})).filter(x=>x.score>0);if(sortMode==='high')items.sort((a,b)=>b.score-a.score);else if(sortMode==='low')items.sort((a,b)=>a.score-b.score);if(!items.length)return;t+=`== ${TQ(sec)} ==\n`;items.forEach(({q,id,score})=>{t+=`[${score}/10] ${TQ(q)}`;if(notes[id])t+=`\n  ${notes[id]}`;if(store[id])t+=`\n  (${store[id]})`;t+='\n';});t+='\n';});
  const commLines=CS.q.map((q,qi)=>{const id='comm_'+qi;if(commA[qi]===undefined&&!(notes[id]&&notes[id].trim()))return null;const ans=commA[qi]!==undefined?(lang==='zh'?q.oz[commA[qi]]:q.oe[commA[qi]]):'—';let line=`${TQ(q)}: ${ans}`;if(notes[id])line+=`\n  ${notes[id]}`;if(store[id])line+=`\n  (${store[id]})`;return line;}).filter(Boolean);
  if(commLines.length){t+=`== ${TQ(CS)} ==\n`+commLines.join('\n')+'\n\n';}
  if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(t).then(()=>toast(T('copied')));
  else{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast(T('copied'));}catch(e){}document.body.removeChild(ta);}
}

function clearAll(){if(!confirm(T('clrC')))return;ratings={};notes={};commA={};openA={};trToEn={};trToZh={};curStep=0;renderStep();}
let toastT=null;function toast(m,d=2200){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),d);}

// ─── INIT ─────────────────────────────────────────────────────────────
(function(){
  const shared=loadShared();
  if(shared){
    ['btnEn','rBtnEn'].forEach(i=>{const e=document.getElementById(i);if(e)e.classList.toggle('active',lang==='en')});
    ['btnZh','rBtnZh'].forEach(i=>{const e=document.getElementById(i);if(e)e.classList.toggle('active',lang==='zh')});
    document.getElementById('vSurvey').style.display='none';
    document.getElementById('fixedBar').style.display='none';
    document.getElementById('vResults').style.display='block';
    document.getElementById('sharedBanner').style.display='flex';
    document.getElementById('sharedBanner').innerHTML=`<i class="ti ti-share" aria-hidden="true"></i>${T('shV')}`;
    document.getElementById('exportRow').querySelector('#rBack').style.display='none';
    updateResultsUI();buildResults();
  } else {
    renderStep();
  }
})();
</script>
